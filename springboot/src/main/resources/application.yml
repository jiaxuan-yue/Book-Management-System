# ============================================================
# 图书管理系统 - 后端配置文件
# ============================================================

server:
  port: 9090

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
    url: jdbc:mysql://localhost:3306/free_system?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:dao/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

fileBaseUrl: http://localhost:9090

# JWT accessToken
jwt:
  secret: "oaj4HKxnulJxql2sw8o6gPe2m3oMzKZJAJezYweNUvRB9yPl5fABVHEbWoAu0za9"
  expire-ms: 86400000

# RSA（登录/注册/改密密码传输加密，前端用公钥加密，后端私钥解密）
rsa:
  private-key: ""
  public-key: ""
